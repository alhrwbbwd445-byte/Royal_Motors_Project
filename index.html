<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Motors | رويال موتورز</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f4f4f4; }
        header { background-color: #1a1a1a; color: white; padding: 1rem; text-align: center; }
        nav { background: #333; padding: 10px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .hero { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1000&q=80'); 
                height: 300px; background-size: cover; color: white; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .container { padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; }
        .card { background: white; margin: 15px; padding: 15px; border-radius: 8px; width: 250px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; border-radius: 5px; }
        .btn { background: #d4af37; color: black; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        footer { background: #1a1a1a; color: white; text-align: center; padding: 10px; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>

<header>
    <h1>Royal Motors - رويال موتورز</h1>
</header>

<nav>
    <a href="#">الرئيسية</a>
    <a href="#">سياراتنا</a>
    <a href="#">تسجيل دخول الأدمن</a>
</nav>

<div class="hero">
    <h2>أهلاً بك في رويال موتورز</h2>
    <p>بوابتك لعالم السيارات الفاخرة</p>
</div>

<div class="container">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=300&q=80" alt="Car">
        <h3>سيارات رياضية</h3>
        <p>اكتشف أحدث الموديلات</p>
        <button class="btn">عرض التفاصيل</button>
    </div>
    <div class="card">
        <h3>تسجيل الدخول</h3>
        <input type="text" placeholder="اسم المستخدم" style="width:90%; margin-bottom:10px;"><br>
        <input type="password" placeholder="كلمة المرور" style="width:90%; margin-bottom:10px;"><br>
        <button class="btn">دخول</button>
    </div>
</div>

<footer>
    <p>© 2026 جميع الحقوق محفوظة - عبدالرحمن الحروب</p>
</footer>

</body>
</html>
